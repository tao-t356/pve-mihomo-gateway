  github: {type: http, behavior: domain, format: mrs, interval: 86400, path: ./ruleset/github.mrs, url: "https://ghfast.top/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/github.mrs"}
