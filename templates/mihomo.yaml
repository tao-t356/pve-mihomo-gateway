mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: true
external-controller: 0.0.0.0:9090
secret: "${MIHOMO_SECRET}"
external-ui: /etc/mihomo/ui
unified-delay: true
tcp-concurrent: true
geo-auto-update: true
geo-update-interval: 24

tun:
  enable: true
  stack: mixed
  device: mihomo
  dns-hijack: [any:53, tcp://any:53]
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  strict-route: true

profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "${MIHOMO_CN_FAKE_IP_FILTER}"
    - "*.lan"
    - "*.local"
    - localhost
    - "+.anti-ad.net"
    - "+.adguardteam.github.io"
    - "+.github.io"
    - "+.githubusercontent.com"
  default-nameserver: [223.5.5.5, 119.29.29.29]
  nameserver: [https://dns.alidns.com/dns-query, https://doh.pub/dns-query]
  direct-nameserver: [https://dns.alidns.com/dns-query, https://doh.pub/dns-query]
  proxy-server-nameserver: [https://dns.alidns.com/dns-query, https://doh.pub/dns-query]
  nameserver-policy:
    "geosite:cn,private": [https://dns.alidns.com/dns-query, https://doh.pub/dns-query]
    "geosite:geolocation-!cn": [https://1.1.1.1/dns-query, https://8.8.8.8/dns-query]
  respect-rules: true

proxy-providers:
  mmw:
    type: http
    url: "http://127.0.0.1:3001/${SUBSTORE_BACKEND_PATH}/download/${SUBSTORE_SUB_NAME}?target=ClashMeta"
    path: ./providers/mmw.yaml
    interval: 3600
    health-check: {enable: true, url: https://www.gstatic.com/generate_204, interval: 300}

proxy-groups:
  - {name: "🚀 节点选择", type: select, proxies: ["♻️ 自动选择", DIRECT, REJECT], use: [mmw]}
  - {name: "♻️ 自动选择", type: url-test, use: [mmw], url: https://www.gstatic.com/generate_204, interval: 300, tolerance: 50, lazy: false}
  - {name: "🤖 AI 服务", type: select, proxies: ["🚀 节点选择", "♻️ 自动选择", DIRECT, REJECT], use: [mmw]}
  - {name: "📹 油管视频", type: select, proxies: ["🚀 节点选择", "♻️ 自动选择", DIRECT, REJECT], use: [mmw]}
  - {name: "🔍 谷歌服务", type: select, proxies: ["🚀 节点选择", "♻️ 自动选择", DIRECT, REJECT], use: [mmw]}
  - {name: "🏠 私有网络", type: select, proxies: [DIRECT, "🚀 节点选择", REJECT], use: [mmw]}
  - {name: "🔒 国内服务", type: select, proxies: [DIRECT, "🚀 节点选择"], use: [mmw]}
  - {name: "📲 电报消息", type: select, proxies: ["🚀 节点选择", "♻️ 自动选择", DIRECT, REJECT], use: [mmw]}
  - {name: "🐱 GitHub", type: select, proxies: ["🚀 节点选择", "♻️ 自动选择", DIRECT, REJECT], use: [mmw]}
  - {name: "Ⓜ️ 微软服务", type: select, proxies: [DIRECT, "🚀 节点选择", "♻️ 自动选择", REJECT], use: [mmw]}
  - {name: "🍏 苹果服务", type: select, proxies: [DIRECT, "🚀 节点选择", "♻️ 自动选择", REJECT], use: [mmw]}
  - {name: "🌍 非中国", type: select, proxies: ["🚀 节点选择", "♻️ 自动选择", DIRECT, REJECT], use: [mmw]}
  - {name: "🐟 漏网之鱼", type: select, proxies: ["🚀 节点选择", "♻️ 自动选择", DIRECT, REJECT], use: [mmw]}
  - {name: TIKTOK, type: select, proxies: ["🚀 节点选择", "♻️ 自动选择", DIRECT, REJECT], use: [mmw]}
  - {name: EMBY, type: select, proxies: ["🚀 节点选择", "♻️ 自动选择", DIRECT, REJECT], use: [mmw]}
  - {name: AD-BLOCK, type: select, proxies: [REJECT, DIRECT]}

