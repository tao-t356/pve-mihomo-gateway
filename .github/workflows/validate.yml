name: validate

on:
  push:
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check shell syntax
        run: |
          bash -n install.sh
          bash -n lib/common.sh
          bash -n scripts/provision-mihomo.sh
          bash -n scripts/provision-adguard.sh
      - name: Check Mihomo YAML
        run: |
          python -m pip install pyyaml
          python - <<'PY'
          from pathlib import Path
          import yaml
          yaml.safe_load(Path('templates/mihomo.yaml').read_text())
          PY

